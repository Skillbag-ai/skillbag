name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - SKILLBAG.md
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Mirror SKILLBAG.md to index.md
        run: |
          mkdir -p .site-src
          cat > .site-src/index.md <<'EOF'
          ---
          title: SkillBag
          ---
          
          EOF
          cat SKILLBAG.md >> .site-src/index.md

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: .site-src
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
